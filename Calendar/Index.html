<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clay County Community Calendar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.10/index.global.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; margin: 10px; }
        #calendar { max-width: 1100px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Card View Styling */
        .event-card { border: 1px solid #ddd; border-radius: 6px; overflow: hidden; background: #fff; margin-bottom: 4px; }
        .event-image { width: 100%; height: 100px; object-fit: cover; background: #eee; display: block; }
        .event-info { padding: 6px; text-align: center; }
        .event-title { font-weight: bold; font-size: 13px; color: #333; line-height: 1.2; }
        .event-time { font-size: 11px; color: #007bff; font-weight: bold; margin-bottom: 2px; }

        /* Style tweaks to make events look like cards */
        .fc-event { background: none !important; border: none !important; padding: 0 !important; cursor: pointer; }
        .fc-event-main { color: inherit !important; }
        .fc-daygrid-event-harness { margin-bottom: 5px !important; }
    </style>
</head>
<body>

    <div id="calendar"></div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          googleCalendarApiKey: 'AIzaSyBZ0TIaGkEQDYLFeIfC0_zTygolYEZd3Oc',
          events: 'ceab82d01e29c237da2e761555f2d2c2da76431b94e0def035ff04410e2cd71d@group.calendar.google.com',
          
          eventContent: function(arg) {
            let desc = arg.event.extendedProps.description || "";
            // Regex to find a link ending in an image format within the description
            let imgMatch = desc.match(/\bhttps?:\/\/\S+\.(?:png|jpg|jpeg|gif)\b/i);
            let imgUrl = imgMatch ? imgMatch[0] : 'https://via.placeholder.com/300x150?text=Event';

            return { html: `
                <div class="event-card">
                    <img src="${imgUrl}" class="event-image">
                    <div class="event-info">
                        <div class="event-time">${arg.timeText}</div>
                        <div class="event-title">${arg.event.title}</div>
                    </div>
                </div>` 
            };
          },

          eventClick: function(info) {
            if (info.event.url) {
              info.jsEvent.preventDefault();
              window.open(info.event.url, '_blank');
            }
          }
        });
        calendar.render();
      });
    </script>
</body>
</html>
