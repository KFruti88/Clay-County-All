<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clay County Community Calendar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.10/index.global.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        #calendar { max-width: 1100px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Event Card Styling */
        .event-card { border: 1px solid #eee; border-radius: 5px; overflow: hidden; background: #fff; }
        .event-image { width: 100%; height: 90px; object-fit: cover; background: #ddd; }
        .event-info { padding: 5px; }
        .event-title { font-weight: bold; font-size: 12px; color: #222; }
        
        .fc-event { background: none !important; border: none !important; }
    </style>
</head>
<body>

    <div id="calendar"></div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,listMonth'
          },
          // YOUR GOOGLE CALENDAR SOURCE
          googleCalendarApiKey: 'AIzaSyBZ0TIaGkEQDYLFeIfC0_zTygolYEZd3Oc',
          events: 'ceab82d01e29c237da2e761555f2d2c2da76431b94e0def035ff04410e2cd71d@group.calendar.google.com',
          
          eventContent: function(arg) {
            let desc = arg.event.extendedProps.description || "";
            // Find first image URL in description
            let imgMatch = desc.match(/\bhttps?:\/\/\S+\.(?:png|jpg|jpeg|gif)\b/i);
            let imgUrl = imgMatch ? imgMatch[0] : 'https://via.placeholder.com/300x150?text=Clay+County+Event';

            return { html: `
                <div class="event-card">
                    <img src="${imgUrl}" class="event-image">
                    <div class="event-info">
                        <div class="event-title">${arg.event.title}</div>
                    </div>
                </div>` 
            };
          },

          eventClick: function(info) {
            info.jsEvent.preventDefault();
            if (info.event.url) {
              window.open(info.event.url, '_blank');
            }
          }
        });
        calendar.render();
      });
    </script>
</body>
</html>
