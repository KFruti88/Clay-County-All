<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Calendar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.10/index.global.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        #calendar { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        
        /* Making events look like "The Events Calendar" Cards */
        .fc-event-main { padding: 0 !important; }
        .event-card { border: 1px solid #ddd; border-radius: 5px; overflow: hidden; background: #fff; }
        .event-image { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .event-info { padding: 10px; }
        .event-title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; color: #333; }
        .event-date { font-size: 0.85em; color: #666; }
    </style>
</head>
<body>

    <div id="calendar"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', // Or 'listMonth' for a clean list
                googleCalendarApiKey: 'YOUR_GOOGLE_API_KEY_HERE',
                events: {
                    googleCalendarId: 'ceab82d01e29c237da2e761555f2d2c2da76431b94e0def035ff04410e2cd71d@group.calendar.google.com'
                },
                // This function adds the image to the card
                eventContent: function(arg) {
                    // Tip: Put your image URL in the Google Calendar "Location" or "Description" field
                    let imageUrl = arg.event.extendedProps.location || 'https://via.placeholder.com/300x150?text=No+Image';
                    
                    let arrayOfDomNodes = [ 
                        Object.assign(document.createElement('div'), {
                            innerHTML: `
                                <div class="event-card">
                                    <img src="${imageUrl}" class="event-image">
                                    <div class="event-info">
                                        <div class="event-title">${arg.event.title}</div>
                                        <div class="event-date">${arg.event.start.toLocaleDateString()}</div>
                                    </div>
                                </div>
                            `
                        })
                    ];
                    return { domNodes: arrayOfDomNodes };
                },
                eventClick: function(info) {
                    info.jsEvent.preventDefault(); // Prevents browser from following link
                    if (info.event.url) { window.open(info.event.url); }
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
