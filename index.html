<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clay County Intelligence Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; background: #f4f4f4; margin: 0; }
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .card { 
            background: white; padding: 25px; border-radius: 12px; width: 220px; 
            text-decoration: none; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s; border-top: 8px solid #333;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .louisville { border-color: #C41E3A; } /* Cardinal Red */
        .flora { border-color: #2e7d32; }      /* Wolves Green */
        h2 { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Clay County Intelligence</h1>
    <p>Select a community portal to view local news and data.</p>
    
    <div class="container">
        <a href="Towns/Louisville/" class="card louisville">
            <h2>Louisville</h2>
            <p>Home of the Cardinals</p>
        </a>

        <a href="Towns/Flora/" class="card flora">
            <h2>Flora</h2>
            <p>Home of the Wolves</p>
        </a>
    </div>
</body>
</html>
