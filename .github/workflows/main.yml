name: Louisville Sync Engine

on:
  schedule:
    - cron: '4,44 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly grants write access to the action
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Louisville Sync Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Robust check for the script location
          if [ -f "louisville.py" ]; then
            python louisville.py
          elif [ -f "Towns/Louisville/louisville.py" ]; then
            python Towns/Louisville/louisville.py
          else
            echo "Error: louisville.py not found in root or Towns/Louisville/"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          # Identify as the GitHub Action bot
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Towns/Louisville/data.json
          # Only push if changes were actually made to data.json
          if git diff --staged --quiet; then
            echo "No changes in data.json"
          else
            git commit -m "Louisville Sync: $(date)"
            git push
          fi
