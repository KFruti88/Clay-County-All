name: Louisville Sync Engine

on:
  schedule:
    - cron: '4,44 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Louisville Sync Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        # We tell it to look in the Towns/Louisville folder specifically
        run: |
          if [ -f "louisville.py" ]; then
            python louisville.py
          elif [ -f "Towns/Louisville/louisville.py" ]; then
            python Towns/Louisville/louisville.py
          else
            echo "Error: louisville.py not found in root or Towns/Louisville/"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Towns/Louisville/data.json
          git commit -m "Update Louisville Intelligence: $(date)" || echo "No changes to commit"
          git push
