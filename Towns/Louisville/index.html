<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louisville Community Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS variables from your 'looks.all' master file */
        :root {
            --town-primary: #C41E3A; 
            --town-secondary: #000000;
            --bg-light: #f8f9fa;
            --shadow: 0 4px 12px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-light);
            margin: 0;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--town-primary), #8B0000);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border-bottom: 5px solid var(--town-secondary);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .mascot-logo {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        main {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        /* --- High-Gloss Station Sign Styling --- */
        .gas-sign {
            background: linear-gradient(145deg, #1a1a1a, #000000);
            border: 2px solid #444;
            border-radius: 15px;
            padding: 0;
            max-width: 400px;
            margin: 0 auto 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.2);
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        .sign-top {
            background: #fff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 4px solid #C41E3A;
        }

        .sign-logo {
            height: 50px;
            width: auto;
            margin-bottom: 5px;
        }

        .sign-location {
            color: #333;
            font-size: 0.7em;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .sign-body {
            padding: 20px;
            background: radial-gradient(circle at center, #333 0%, #000 100%);
        }

        .fuel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .fuel-row::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .fuel-info { display: flex; flex-direction: column; }
        .fuel-name { color: #fff; font-size: 1.1em; }
        .unleaded .fuel-name { color: #ffeb3b; }
        .diesel .fuel-name { color: #4caf50; }
        .fuel-octane { color: #aaa; font-size: 0.6em; }

        .fuel-price-display { display: flex; align-items: flex-start; color: #fff; }
        .digital-value {
            font-size: 2.8em;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .nine-tenths {
            font-size: 1em;
            margin-top: 5px;
            margin-left: 2px;
            border-bottom: 1px solid #fff;
        }

        .sign-footer {
            background: #C41E3A;
            color: white;
            text-align: center;
            font-size: 0.6em;
            padding: 5px;
            letter-spacing: 1px;
        }

        /* --- News Section --- */
        #news-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .news-card {
            background: #fff;
            border-left: 5px solid var(--town-primary);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 4px;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .news-card:hover { transform: translateX(10px); }

        .category-tag {
            color: var(--town-primary);
            font-weight: bold;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="LouisvilleMascot.PNG" alt="North Clay Mascot" class="mascot-logo">
            <div>
                <h1 style="margin: 0; font-size: 2.5em;">Louisville, IL</h1>
                <p style="margin: 0; font-style: italic; opacity: 0.9;">Home of the North Clay Cardinals</p>
            </div>
        </div>
        <a href="../../index.html" class="back-link">← Community Dashboard</a>
    </header>

    <main>
        <div class="gas-sign">
            <div class="sign-top">
                <img src="https://github.com/KFruti88/Clay-County-Fuel/raw/main/images/caseys.png" alt="Casey's" class="sign-logo">
                <div class="sign-location">LOUISVILLE #48026</div>
            </div>
            
            <div class="sign-body">
                <div class="fuel-row unleaded">
                    <div class="fuel-info">
                        <span class="fuel-name">UNLEADED</span>
                        <span class="fuel-octane">87</span>
                    </div>
                    <div class="fuel-price-display">
                        <span id="reg-price" class="digital-value">---</span>
                        <span class="nine-tenths">9</span>
                    </div>
                </div>

                <div class="fuel-row diesel">
                    <div class="fuel-info">
                        <span class="fuel-name">DIESEL</span>
                        <span class="fuel-octane">ULSD</span>
                    </div>
                    <div class="fuel-price-display">
                        <span id="diesel-price" class="digital-value">---</span>
                        <span class="nine-tenths">9</span>
                    </div>
                </div>
            </div>
            <div id="gas-updated" class="sign-footer">AWAITING SCAN...</div>
        </div>

        <div id="news-section">
            <h2 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">Community Intelligence Feed</h2>
            <div id="news-text">Gathering data from repositories...</div>
        </div>
    </main>

    <script>
        const dataSources = ['data.json'];

        async function loadIntelligence() {
            const container = document.getElementById('news-text');
            const regDisplay = document.getElementById('reg-price');
            const dieselDisplay = document.getElementById('diesel-price');
            const statusFooter = document.getElementById('gas-updated');
            
            try {
                const results = await Promise.all(
                    dataSources.map(url => fetch(url).then(res => {
                        if(!res.ok) throw new Error(`Source ${url} failed`);
                        return res.json();
                    }))
                );

                const allUpdates = results.flatMap(data => data.updates || []);
                
                // --- Process Gas Station Data ---
                const gasEntry = allUpdates.find(item => item.name.includes('48026'));
                if (gasEntry) {
                    const parts = gasEntry.name.split(',');
                    // logic: StationID[0], Name[1], Reg[2], Diesel[3]
                    regDisplay.innerText = parts[2] ? parts[2].trim() : "---";
                    dieselDisplay.innerText = parts[3] ? parts[3].trim() : "---";
                    statusFooter.innerText = `SYNCED: ${new Date().toLocaleDateString()}`;
                }

                // --- Render News Cards ---
                if (allUpdates.length > 0) {
                    // We filter out the raw station data entry from the news feed for a cleaner look
                    const newsOnly = allUpdates.filter(item => !item.name.includes('48026'));
                    
                    container.innerHTML = newsOnly.map(item => `
                        <div class="news-card">
                            <span class="category-tag">[${item.category}]</span><br>
                            <a href="${item.url}" target="_blank" style="color: #333; text-decoration: none; font-size: 1.2em; font-weight: 500;">
                                ${item.name}
                            </a>
                        </div>
                    `).join('');
                } else {
                    container.innerText = "No intelligence found in recent scans.";
                }
            } catch (error) {
                console.error('Master Logic Error:', error);
                container.innerHTML = "<p style='color:red;'>System Sync in Progress...</p>";
            }
        }

        loadIntelligence();
    </script>
</body>
</html>
