<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louisville Community Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS from your 'looks.all' master file */
        :root {
            --town-primary: #C41E3A; /* Louisville Red from your town-colors */
            --town-secondary: #000000;
            --bg-light: #f8f9fa;
            --shadow: 0 4px 12px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-light);
            margin: 0;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--town-primary), #8B0000);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border-bottom: 5px solid var(--town-secondary);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .mascot-logo {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        main {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        #news-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .news-card {
            background: #fff;
            border-left: 5px solid var(--town-primary);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 4px;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .news-card:hover {
            transform: translateX(10px);
        }

        .category-tag {
            color: var(--town-primary);
            font-weight: bold;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 8px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="LouisvilleMascot.PNG" alt="North Clay Mascot" class="mascot-logo">
            <div>
                <h1 style="margin: 0; font-size: 2.5em;">Louisville, IL</h1>
                <p style="margin: 0; font-style: italic; opacity: 0.9;">Home of the North Clay Cardinals</p>
            </div>
        </div>
        <a href="../../index.html" class="back-link">← Community Dashboard</a>
    </header>

    <main>
        <div id="news-section">
            <h2 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">Community Intelligence Feed</h2>
            <div id="news-text">Gathering data from repositories...</div>
        </div>
    </main>

    <script>
        /** * Logic inspired by your 'Promise.all' file
         * This version can fetch from multiple sources if needed 
         **/
        const dataSources = ['data.json']; // You can add more JSON paths here later

        async function loadIntelligence() {
            const container = document.getElementById('news-text');
            
            try {
                // Promise.all ensures all data sources are checked before rendering
                const results = await Promise.all(
                    dataSources.map(url => fetch(url).then(res => {
                        if(!res.ok) throw new Error(`Source ${url} failed`);
                        return res.json();
                    }))
                );

                // Combine updates from all sources (if multiple)
                const allUpdates = results.flatMap(data => data.updates || []);
                
                if (allUpdates.length > 0) {
                    container.innerHTML = allUpdates.map(item => `
                        <div class="news-card">
                            <span class="category-tag">[${item.category}]</span><br>
                            <a href="${item.url}" target="_blank" style="color: #333; text-decoration: none; font-size: 1.2em; font-weight: 500;">
                                ${item.name}
                            </a>
                        </div>
                    `).join('');
                } else {
                    container.innerText = "No intelligence found in recent scans.";
                }
            } catch (error) {
                console.error('Master Logic Error:', error);
                container.innerHTML = "<p style='color:red;'>System Sync in Progress... please refresh shortly.</p>";
            }
        }

        loadIntelligence();
    </script>
</body>
</html>
