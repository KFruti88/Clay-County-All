name: Louisville Sync Engine

on:
  schedule:
    # This runs exactly at 4 minutes and 44 minutes past every hour
    - cron: '4,44 * * * *'
  workflow_dispatch: # Still allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Louisville Sync Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python louisville.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Towns/Louisville/data.json
          git commit -m "Update Louisville Intelligence: $(date)" || echo "No changes to commit"
          git push
